<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>暗記ノート</title>
    <!-- ライブラリ読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        /* 全体設定 */
        @media (max-width: 640px) { html { font-size: 80%; } }
        body { background: #F8F9FA; color: #333; font-family: sans-serif; }
        .highlight { background: linear-gradient(transparent 60%, #FEF08A 40%); font-weight: bold; }
        
        /* 穴埋めデザイン */
        .blank-hole { cursor: pointer; user-select: none; display: inline-block; padding: 0.1rem 0.5rem; margin: 0 0.2rem; border-radius: 6px; font-weight: bold; position: relative; transition: 0.2s; }
        .blank-hole[data-state="0"] { background: #E2E8F0; color: #64748B; border: 1px solid #CBD5E1; }
        .blank-hole[data-state="1"] { background: #F1F5F9; color: #334155; border: 1px dashed #94A3B8; }
        .blank-hole[data-state="2"] { background: transparent; color: #0EA5E9; border-bottom: 2px solid #BAE6FD; border-radius: 0; padding: 0.1rem 0.2rem; }
        .print-footer { display: none; }
        
        /* 印刷（PDF）用設定 */
        @media print {
            @page { margin: 15mm; }
            .no-print { display: none !important; }
            body { background: white !important; }
            .highlight { background: none !important; background-color: #FEF08A !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
            .print-footer { display: block !important; position: fixed; bottom: 0; right: 0; font-size: 10pt; color: #888; background: white; }
        }
        /* 印刷モード: テスト用紙 */
        .print-mode-hole .blank-hole { background: #E2E8F0 !important; color: transparent !important; border: 1px solid #CBD5E1 !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        .print-mode-hole .blank-hole::before { content: attr(data-num); color: #64748B; font-size: 0.8rem; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        /* 印刷モード: 赤シート */
        .print-mode-red .blank-hole { background: transparent !important; color: #FF5555 !important; border: none !important; border-bottom: 1px dashed #FF5555 !important; padding: 0; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen pb-20">
        <!-- ハンバーガーメニュー背景 -->
        <div v-if="menuOpen" @click="menuOpen = false" class="fixed inset-0 z-40 no-print"></div>
        
        <header class="bg-white shadow-sm sticky top-0 z-50 no-print">
            <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center relative">
                <h1 class="text-xl font-bold cursor-pointer hover:text-blue-500" @click="changePage('list')">📚 暗記ノート</h1>
                <button @click="menuOpen = !menuOpen" class="p-2 text-gray-600 hover:text-blue-500 outline-none">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                
                <!-- メニュー -->
                <div v-if="menuOpen" class="absolute right-4 top-16 w-56 bg-white border shadow-xl z-50 rounded-xl overflow-hidden">
                    <a href="#" @click.prevent="changePage('list')" class="block p-4 border-b font-bold text-gray-700 hover:bg-gray-50">🏠 トップへ戻る</a>
                    <a href="#" @click.prevent="changePage('settings')" class="block p-4 font-bold border-b text-gray-700 hover:bg-gray-50">⚙️ 設定</a>
                    <div v-if="activePage === 'study'" class="py-2">
                        <div class="px-4 py-1 text-xs font-bold text-gray-400">🖨️ PDF / 印刷</div>
                        <a href="#" @click.prevent="triggerPrint('normal')" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50">📄 通常モード</a>
                        <a href="#" @click.prevent="triggerPrint('hole')" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50">📝 テスト用紙(空欄)</a>
                        <a href="#" @click.prevent="triggerPrint('red')" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50">📕 赤シート用(朱色)</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 mt-6">
            <!-- 一覧画面 -->
            <div v-if="activePage === 'list'">
                <div class="flex justify-end mb-4 no-print"><button @click="createData" class="bg-blue-500 text-white px-5 py-2.5 rounded-lg font-bold shadow hover:bg-blue-600 transition">＋ 新規作成</button></div>
                <div v-if="recordList.length === 0" class="text-center py-20 text-gray-500 bg-white rounded-xl border">ノートがありません</div>
                <div class="grid sm:grid-cols-2 gap-4">
                    <div v-for="item in recordList" :key="item.id" class="bg-white p-5 rounded-xl border cursor-pointer hover:shadow-md transition" @click="openStudy(item)">
                        <h2 class="font-bold text-lg mb-2 truncate text-gray-800">{{ item.title || '無題' }}</h2>
                        <p class="text-sm text-gray-500 mb-4">{{ new Date(item.updatedAt).toLocaleString() }}</p>
                        <div class="flex justify-between items-center no-print">
                            <span class="text-blue-500 text-sm font-bold">学習する ➔</span>
                            <button @click.stop="editData(item)" class="bg-gray-100 px-3 py-1 rounded text-sm font-bold">編集</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 編集画面 -->
            <div v-if="activePage === 'edit'" class="bg-white p-6 rounded-xl border">
                <input v-model="editItem.title" placeholder="ノートのタイトル" class="w-full text-2xl font-bold border-b pb-2 mb-4 outline-none focus:border-blue-500">
                <div class="mb-4 text-sm text-gray-500 bg-gray-50 p-3 rounded">💡 <code>{{暗記}}</code> で穴埋め、<code>==重要==</code> で蛍光ペンになります。</div>
                <textarea v-model="editItem.content" placeholder="# 見出し&#10;ここは{{暗記}}です。" class="w-full h-96 p-4 border rounded-lg outline-none focus:ring-2 focus:ring-blue-200 font-mono text-sm leading-relaxed"></textarea>
                <div class="flex gap-3 justify-end mt-4">
                    <button v-if="editItem.id" @click="removeData(editItem.id)" class="px-4 py-2 text-red-500 font-bold hover:bg-red-50 rounded">削除</button>
                    <button @click="changePage('list')" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded">キャンセル</button>
                    <button @click="saveData" class="px-6 py-2 bg-blue-500 text-white font-bold rounded-lg shadow">保存する</button>
                </div>
            </div>

            <!-- 学習画面 -->
            <div v-if="activePage === 'study'" :class="pModeClass">
                <div class="bg-white p-8 md:p-12 rounded-2xl border shadow-sm">
                    <h1 class="text-3xl font-bold mb-8 pb-4 border-b text-gray-900">{{ editItem.title }}</h1>
                    <div v-html="renderedHtml" class="text-gray-800 prose prose-slate max-w-none"></div>
                </div>
                <div class="print-footer">Created with 暗記ノート App</div>
            </div>

            <!-- 設定画面 -->
            <div v-if="activePage === 'settings'" class="bg-white p-6 border rounded-xl max-w-sm mx-auto mt-10 shadow-sm">
                <h2 class="font-bold text-xl mb-4 border-b pb-2">⚙️ アプリ設定</h2>
                <label class="flex justify-between items-center cursor-pointer mt-6">
                    <div>
                        <span class="font-bold block">1文字ヒントスキップ</span>
                        <span class="text-xs text-gray-500">タップ時に2段階で切り替えます</span>
                    </div>
                    <input type="checkbox" v-model="appConfig.skipHint" @change="saveConfig" class="w-5 h-5 accent-blue-500">
                </label>
            </div>
        </main>
    </div>

    <!-- JavaScript ロジック -->
    <script>
        // 穴埋めタップ関数 (グローバル)
        window.toggleHole = function(el) {
            if(document.querySelector('.print-mode-hole, .print-mode-red')) return; // 印刷時は無効
            let state = parseInt(el.getAttribute('data-state') || '0');
            let answer = el.getAttribute('data-answer');
            let num = el.getAttribute('data-num');
            let skip = localStorage.getItem('anki_skipHint') === 'true';

            if(state === 0) {
                if(skip) { el.setAttribute('data-state', '2'); el.innerText = answer; }
                else { el.setAttribute('data-state', '1'); el.innerText = answer.charAt(0) + '...'; }
            } else if(state === 1) {
                el.setAttribute('data-state', '2'); el.innerText = answer;
            } else {
                el.setAttribute('data-state', '0'); el.innerText = num;
            }
        };

        // Dexie データベース初期化
        const db = new Dexie('AnkiDB'); 
        db.version(1).stores({ records: '++id, title, updatedAt' });

        // Vue アプリケーションの初期化
        Vue.createApp({
            data() {
                return {
                    activePage: 'list',
                    // 呪いの記号を避けるため new Array() を使用
                    recordList: new Array(), 
                    editItem: { title: '', content: '' },
                    renderedHtml: '',
                    pModeClass: '',
                    menuOpen: false,
                    appConfig: { skipHint: localStorage.getItem('anki_skipHint') === 'true' }
                }
            },
            async mounted() {
                await this.loadData();
            },
            methods: {
                changePage(page) {
                    this.activePage = page;
                    this.menuOpen = false;
                    window.scrollTo(0, 0);
                },
                async loadData() {
                    const data = await db.records.orderBy('updatedAt').reverse().toArray();
                    this.recordList = data;
                },
                createData() {
                    this.editItem = { title: '', content: '' };
                    this.changePage('edit');
                },
                editData(item) {
                    this.editItem = Object.assign({}, item);
                    this.changePage('edit');
                },
                async saveData() {
                    const itemToSave = Object.assign({}, this.editItem, { updatedAt: Date.now() });
                    if (itemToSave.id) {
                        await db.records.put(itemToSave);
                    } else {
                        await db.records.add(itemToSave);
                    }
                    await this.loadData();
                    this.changePage('list');
                },
                async removeData(id) {
                    if (confirm('このノートを削除してもよろしいですか？')) {
                        await db.records.delete(id);
                        await this.loadData();
                        this.changePage('list');
                    }
                },
                openStudy(item) {
                    this.editItem = item;
                    this.pModeClass = '';
                    this.generateHtml(item.content);
                    this.changePage('study');
                },
                generateHtml(text) {
                    if (!text) {
                        this.renderedHtml = '';
                        return;
                    }
                    let html = marked.parse(text);
                    let counter = 1;
                    html = html.replace(/\{\{(.+?)\}\}/g, (match, word) => {
                        const num = counter++;
                        return `<span class="blank-hole" data-answer="${word}" data-num="${num}" data-state="0" onclick="toggleHole(this)">${num}</span>`;
                    });
                    html = html.replace(/==(.+?)==/g, '<span class="highlight">$1</span>');
                    this.renderedHtml = html;
                },
                triggerPrint(mode) {
                    if (mode === 'hole') this.pModeClass = 'print-mode-hole';
                    else if (mode === 'red') this.pModeClass = 'print-mode-red';
                    else this.pModeClass = '';
                    
                    this.menuOpen = false;

                    // 印刷前にState2（全表示）にして文字幅を確保
                    this.$nextTick(() => {
                        const holes = document.querySelectorAll('.blank-hole');
                        holes.forEach(hole => {
                            const answer = hole.getAttribute('data-answer');
                            hole.setAttribute('data-state', '2');
                            hole.innerText = answer;
                        });
                        setTimeout(() => {
                            window.print();
                        }, 300);
                    });
                },
                saveConfig() {
                    localStorage.setItem('anki_skipHint', this.appConfig.skipHint);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>

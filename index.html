<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗記ノート - Markdown Learning App</title>
    
    <!-- Tailwind CSS (スタイリング) & Typography プラグイン (Markdown綺麗に表示) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Vue 3 (UI状態管理) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- Marked.js (Markdownパース) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Dexie.js (IndexedDBローカル保存) -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        /* --- Zenn風カスタマイズ & 暗記用CSS --- */
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #F8F9FA; color: #333; }
        
        /* 蛍光ペン（ハイライト） */
        .highlight { background: linear-gradient(transparent 60%, #FEF08A 40%); font-weight: bold; }
        
        /* 穴埋め要素の基本スタイル */
        .blank-hole { cursor: pointer; user-select: none; transition: all 0.2s; display: inline-block; padding: 0.1rem 0.5rem; margin: 0 0.2rem; border-radius: 6px; font-weight: bold; font-size: 0.9em;}
        /* State 0: 隠す（グレー背景） */
        .blank-hole[data-state="0"] { background-color: #E2E8F0; color: #64748B; border: 1px solid #CBD5E1; }
        /* State 1: ヒント（1文字表示） */
        .blank-hole[data-state="1"] { background-color: #F1F5F9; color: #334155; border: 1px dashed #94A3B8; }
        /* State 2: 全表示（アクセントカラー） */
        .blank-hole[data-state="2"] { background-color: transparent; color: #0EA5E9; border-bottom: 2px solid #BAE6FD; border-radius: 0; padding: 0.1rem 0.2rem;}

        /* --- PDF出力（印刷）用モードのCSS --- */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            .prose { max-width: 100% !important; }
        }

        /* 印刷モード: 穴埋めテスト用（強制的にState 0の見た目にする） */
        .print-mode-hole .blank-hole { background-color: #E2E8F0 !important; color: transparent !important; border: 1px solid #CBD5E1 !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        .print-mode-hole .blank-hole::before { content: attr(data-num); color: #64748B; font-size: 0.8rem;}

        /* 印刷モード: 朱色（赤シート）用 */
        .print-mode-red .blank-hole { background-color: transparent !important; color: #FF5555 !important; border: none !important; border-bottom: 1px dashed #FF5555 !important; padding: 0; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen pb-20">
        <!-- ヘッダー -->
        <header class="bg-white shadow-sm sticky top-0 z-10 no-print">
            <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800 cursor-pointer hover:text-blue-500 transition" @click="changeView('list')">
                    📚 暗記ノート
                </h1>
                <button v-if="currentView === 'list'" @click="createNewNote" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow transition">
                    ＋ 新規作成
                </button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 mt-6">
            
            <!-- 【画面1】 ノート一覧画面 -->
            <div v-if="currentView === 'list'">
                <div v-if="notes.length === 0" class="text-center py-20 text-gray-500">
                    <p class="text-lg">ノートがありません。</p>
                    <p class="text-sm mt-2">「＋ 新規作成」から最初のノートを作成しましょう。</p>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                    <div v-for="note in notes" :key="note.id" class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer" @click="openStudyView(note)">
                        <h2 class="text-lg font-bold text-gray-800 mb-2 truncate">{{ note.title || '無題のノート' }}</h2>
                        <p class="text-sm text-gray-500 mb-4">{{ new Date(note.updatedAt).toLocaleString() }}</p>
                        <div class="flex justify-between items-center no-print">
                            <span class="text-blue-500 text-sm font-bold">学習する ➔</span>
                            <button @click.stop="editNote(note)" class="text-gray-400 hover:text-gray-600 text-sm">編集</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 【画面2】 ノート編集画面 -->
            <div v-if="currentView === 'edit'" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <input v-model="currentNote.title" type="text" placeholder="ノートのタイトル" class="w-full text-2xl font-bold border-b border-gray-200 focus:outline-none focus:border-blue-500 pb-2 mb-4">
                <div class="mb-4 text-sm text-gray-500 bg-gray-50 p-3 rounded-lg">
                    💡 <strong>書き方のヒント:</strong> 暗記したい単語を <code>{{単語}}</code> で囲みます。蛍光ペンは <code>==重要==</code> です。通常のMarkdownも使えます。
                </div>
                <textarea v-model="currentNote.content" placeholder="# 見出し&#10;ここは{{暗記}}する場所です。&#10;ここは==重要==です。" class="w-full h-96 p-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200 resize-y font-mono text-sm leading-relaxed"></textarea>
                
                <div class="flex justify-end gap-3 mt-4">
                    <button v-if="currentNote.id" @click="deleteNote(currentNote.id)" class="px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg transition">削除</button>
                    <button @click="changeView('list')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">キャンセル</button>
                    <button @click="saveNote" class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg shadow transition">保存する</button>
                </div>
            </div>

            <!-- 【画面3】 学習（閲覧）画面 -->
            <div v-if="currentView === 'study'" :class="printModeClass">
                <!-- PDF出力用ツールバー -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-wrap gap-4 items-center justify-between no-print">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-gray-600">表示モード:</span>
                        <select v-model="printMode" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
                            <option value="normal">通常（タップで暗記）</option>
                            <option value="hole">テスト用紙（全穴埋め）</option>
                            <option value="red">赤シート用（朱色文字）</option>
                        </select>
                    </div>
                    <button @click="printPDF" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-sm">
                        🖨️ PDFで出力
                    </button>
                </div>

                <!-- ノート本文 (Zennライクなスタイル) -->
                <div class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-gray-100">
                    <h1 class="text-3xl font-bold text-gray-900 mb-8 pb-4 border-b-2 border-gray-100">{{ currentNote.title }}</h1>
                    
                    <!-- Markdownをパースして流し込む場所 -->
                    <div class="prose prose-slate prose-lg max-w-none" v-html="parsedContent"></div>
                </div>
                
                <div class="mt-6 text-center no-print">
                    <button @click="changeView('list')" class="text-gray-500 hover:text-gray-700 underline">← 一覧に戻る</button>
                </div>
            </div>

        </main>
    </div>

    <!-- アプリケーションのロジック -->
    <script>
        // --- 1. グローバル関数（穴埋めのタップ処理） ---
        // Vueの管理外(v-html内)の要素のクリックを処理するため、グローバルに定義します。
        window.toggleHole = function(el) {
            // テスト用紙/赤シートモードの時はタップを無効化
            if(document.getElementById('app').querySelector('.print-mode-hole, .print-mode-red')) return;

            const state = parseInt(el.getAttribute('data-state') || '0');
            const answer = el.getAttribute('data-answer');
            const num = el.getAttribute('data-num');

            if (state === 0) {
                // State 1: ヒント（1文字目 + ...）
                el.setAttribute('data-state', '1');
                el.innerText = answer.charAt(0) + '...';
            } else if (state === 1) {
                // State 2: 全表示
                el.setAttribute('data-state', '2');
                el.innerText = answer;
            } else {
                // State 0: 元に戻す（番号表示）
                el.setAttribute('data-state', '0');
                el.innerText = num;
            }
        };

        // --- 2. データベースの初期化 (Dexie.js) ---
        const db = new Dexie('AnkiNoteDB');
        db.version(1).stores({
            notes: '++id, title, updatedAt' // contentはインデックス不要なので省略
        });

        // --- 3. Vueアプリの初期化 ---
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    currentView: 'list', // 'list', 'edit', 'study'
                    notes: [],
                    currentNote: { title: '', content: '' },
                    parsedContent: '',
                    printMode: 'normal' // 'normal', 'hole', 'red'
                }
            },
            computed: {
                // 表示モードに応じたCSSクラスを親要素に付与する
                printModeClass() {
                    if (this.printMode === 'hole') return 'print-mode-hole';
                    if (this.printMode === 'red') return 'print-mode-red';
                    return '';
                }
            },
            async mounted() {
                await this.loadNotes();
            },
            methods: {
                // 画面切り替え
                changeView(view) {
                    this.currentView = view;
                    window.scrollTo(0, 0);
                },
                // ノート一覧の読み込み
                async loadNotes() {
                    // 更新日時の降順（新しい順）で取得
                    this.notes = await db.notes.orderBy('updatedAt').reverse().toArray();
                },
                // 新規作成ボタン
                createNewNote() {
                    this.currentNote = { title: '', content: '' };
                    this.changeView('edit');
                },
                // 編集ボタン
                editNote(note) {
                    // オブジェクトのコピーを作成して編集中にリストが書き換わらないようにする
                    this.currentNote = { ...note };
                    this.changeView('edit');
                },
                // 保存処理
                async saveNote() {
                    const noteToSave = {
                        ...this.currentNote,
                        updatedAt: Date.now()
                    };
                    
                    if (noteToSave.id) {
                        // 更新
                        await db.notes.put(noteToSave);
                    } else {
                        // 新規作成
                        await db.notes.add(noteToSave);
                    }
                    
                    await this.loadNotes();
                    this.changeView('list');
                },
                // 削除処理
                async deleteNote(id) {
                    if (confirm('このノートを削除してもよろしいですか？')) {
                        await db.notes.delete(id);
                        await this.loadNotes();
                        this.changeView('list');
                    }
                },
                // 学習画面を開く
                openStudyView(note) {
                    this.currentNote = note;
                    this.printMode = 'normal'; // モードをリセット
                    this.generateStudyHTML(note.content);
                    this.changeView('study');
                },
                // Markdownの変換ロジック
                generateStudyHTML(markdownText) {
                    if (!markdownText) {
                        this.parsedContent = '';
                        return;
                    }

                    // 1. まず標準のMarkdownをHTMLに変換
                    let html = marked.parse(markdownText);

                    // 2. {{単語}} を 穴埋め要素に置換する（連番を振る）
                    let holeCounter = 1;
                    html = html.replace(/\{\{(.+?)\}\}/g, (match, word) => {
                        const num = holeCounter++;
                        // ※エスケープ処理は簡易的です
                        return `<span class="blank-hole" data-answer="${word}" data-num="${num}" data-state="0" onclick="toggleHole(this)">${num}</span>`;
                    });

                    // 3. ==単語== を 蛍光ペン要素に置換する
                    html = html.replace(/==(.+?)==/g, '<span class="highlight">$1</span>');

                    this.parsedContent = html;
                },
                // PDF出力（印刷ダイアログの呼び出し）
                printPDF() {
                    window.print();
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
